<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedThread | Hospital Command Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4d6d; --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        .pulse-dot { height: 8px; width: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
        .patient-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-size: 0.85rem; outline: none; transition: 0.3s; }
        .patient-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .donor-card { transition: 0.3s ease; border-left: 3px solid transparent; background: rgba(255,255,255,0.03); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid rgba(255,255,255,0.05); }
        .donor-card:hover { transform: translateX(5px); border-left-color: var(--primary); background: rgba(255,255,255,0.08); }
        #status-terminal { margin-top: 40px; background: #070b14; border: 1px solid #1e293b; border-radius: 16px; font-family: 'Courier New', monospace; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .terminal-header { background: rgba(255, 255, 255, 0.03); padding: 12px 18px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        #log-output { padding: 15px; height: 160px; overflow-y: auto; font-size: 0.8rem; line-height: 1.6; color: #94a3b8; }
        #log-output::-webkit-scrollbar { width: 4px; }
        #log-output::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .escalation-timer { color: #ffb703; font-size: 0.7rem; font-weight: bold; margin-top: 15px; display: block; letter-spacing: 0.5px; border-top: 1px solid rgba(255, 183, 3, 0.2); padding-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <span class="blood-drop">🩸</span>
            <div class="logo-thread-wrap"><span class="text-red">Red</span><span class="text-thread">thread</span></div>
        </div>
        <div class="nav-item active" onclick="window.location.href='index.html'">Dashboard</div>
        <div class="nav-item" onclick="window.location.href='map_view.html'">Donor Map</div>
        <div class="nav-item" onclick="window.location.href='storage_logs.html'">Storage Logs</div>
    </div>

    <div class="main-content">
        <header>
            <h1>Emergency Response Portal <span class="sub-header">System Active</span></h1>
            <div class="status-badge" id="system-status"><span class="pulse-dot"></span>BACKEND LINKED</div>
        </header>

        <div class="dashboard-grid">
            <div class="left-col">
                <section class="request-panel glass-card">
                    <h3>New Emergency Request</h3>
                    <div class="input-group-vertical">
                        <input type="text" id="patientID" class="patient-input" placeholder="Emergency Case ID (e.g. Ward 4-B)">
                        <select id="bloodGroup">
                            <option value="O+">O Positive (O+)</option>
                            <option value="O-">O Negative (O-)</option>
                            <option value="A+">A Positive (A+)</option>
                            <option value="A-">A Negative (A-)</option>
                            <option value="B+">B Positive (B+)</option>
                            <option value="B-">B Negative (B-)</option>
                            <option value="AB+">AB Positive (AB+)</option>
                            <option value="AB-">AB Negative (AB-)</option>
                        </select>
                        <button class="sos-btn-large" id="sos-btn" onclick="handleEmergencyActivation()">ACTIVATE SOS</button>
                        
                        <div id="status-terminal" style="display: none;">
                            <div class="terminal-header">
                                <span style="color: var(--primary); font-size: 0.7rem; font-weight: bold; letter-spacing: 1px;">SYSTEM TRANSMISSION LOG</span>
                                <span style="color: #4ade80; font-size: 0.65rem; font-weight: bold;">● ENCRYPTED</span>
                            </div>
                            <div id="log-output"></div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <div class="stats-grid">
                    <div class="stat-card"><span>Live Matches</span><h2 id="donorCount">0</h2></div>
                    <div class="stat-card"><span>Avg. Response</span><h2>4.2 min</h2></div>
                    <div class="stat-card"><span>Storage Temp</span><h2 id="tempDisplay">4.0°C</h2></div>
                </div>

                <section class="results-container glass-card">
                    <h3 class="section-label">Live Broadcast Results</h3>
                    <div id="results" class="results-list">
                        <p class="placeholder-text">Awaiting emergency trigger...</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // Global storage for filtered donor data from backend
        let phase1Donors = [];
        let phase2Donors = [];
        let phase3Donors = [];

        async function handleEmergencyActivation() {
            const bloodGroup = document.getElementById('bloodGroup').value;
            const terminal = document.getElementById('status-terminal');
            const logOutput = document.getElementById('log-output');
            const resultsDiv = document.getElementById('results');
            const btn = document.getElementById('sos-btn');

            terminal.style.display = 'block';
            logOutput.innerHTML = "";
            resultsDiv.innerHTML = "<div class='loader'></div>";
            btn.innerText = "BROADCASTING...";
            btn.disabled = true;

            const log = (msg, col = "#94a3b8") => {
                logOutput.innerHTML += `<div style="color: ${col}; margin-bottom: 4px;">> ${msg}</div>`;
                logOutput.scrollTop = logOutput.scrollHeight;
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/request-blood', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: 13.0280, lon: 80.0440, blood_group: bloodGroup })
                });

                const data = await response.json();
                
                // STRICT DISTANCE FILTERING (Fixing the Rahul 13.99km issue)
                // We combine all donors returned and re-sort them into strict buckets
                const allDonors = [...data.immediate_donors, ...data.escalation_donors];
                phase1Donors = allDonors.filter(d => d.distance_km <= 5);
                phase2Donors = allDonors.filter(d => d.distance_km > 5 && d.distance_km <= 10);
                phase3Donors = allDonors.filter(d => d.distance_km > 10 && d.distance_km <= 25);

                log(`ESTABLISHING AES-256 SECURE LINK...`, "#4ade80");
                
                // Phase 1 (0-5km)
                setTimeout(() => {
                    document.getElementById('donorCount').innerText = phase1Donors.length;
                    log(`PHASE 1: Calling ${phase1Donors.length} donors within 5km radius.`, "#4ade80");
                    renderDonors(phase1Donors, `Phase 1: Immediate Matches (5km)`, "CALL + ALERT SENT");
                    
                    startEscalationSequence(30, log, 2);
                }, 1500);

            } catch (err) {
                log("BACKEND OFFLINE", "#ff4d6d");
                btn.disabled = false;
            }
        }

        function startEscalationSequence(seconds, logFn, phase) {
            const resultsDiv = document.getElementById('results');
            let timerContainer = document.getElementById('timer-msg');
            if (!timerContainer) {
                timerContainer = document.createElement('div');
                timerContainer.id = "timer-msg";
                resultsDiv.appendChild(timerContainer);
            }

            let timeLeft = seconds;
            const interval = setInterval(() => {
                const targetText = phase === 2 ? "10KM" : "25KM (SMS)";
                timerContainer.innerHTML = `<span class="escalation-timer">IF NO RESPONSE-ESCALATING TO ${targetText} IN: ${timeLeft}s</span>`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(interval);
                    timerContainer.innerHTML = "";

                    if (phase === 2) {
                        // Phase 2: 5-10km (Calls)
                        logFn(`PHASE 2: Escalating to 10km radius. Calling ${phase2Donors.length} donors.`, "#ffb703");
                        renderDonors(phase2Donors, `Phase 2: Escalated Matches (10km)`, "CALL + ALERT SENT", true);
                        updateCount(phase2Donors.length);
                        
                        if (phase3Donors.length > 0) startEscalationSequence(30, logFn, 3);
                    } else {
                        // Phase 3: 10-25km (SMS Only)
                        logFn(`PHASE 3: Radius expanded to 25km. SMS dispatch to ${phase3Donors.length} donors.`, "#38bdf8");
                        renderDonors(phase3Donors, `Phase 3: Extended Reach (25km)`, "SMS/WHATSAPP DISPATCHED", true);
                        updateCount(phase3Donors.length);
                        timerContainer.remove();
                    }
                }
            }, 1000);
        }

        function updateCount(newNum) {
            const currentCount = parseInt(document.getElementById('donorCount').innerText);
            document.getElementById('donorCount').innerText = currentCount + newNum;
        }

        function renderDonors(list, title, statusText, append = false) {
            const resultsDiv = document.getElementById('results');
            let html = `<h4 style="color:var(--primary); font-size:0.7rem; margin:20px 0 10px 0; text-transform:uppercase;">${title}</h4>`;
            
            if (list.length === 0) {
                html += `<p style="font-size:0.75rem; color:#64748b; margin-left:10px;">No donors found in this range.</p>`;
            } else {
                list.forEach(d => {
                    html += `
                    <div class="donor-card">
                        <div><strong style="color:white; font-size:0.9rem;">${d.name}</strong><br><span style="font-size:0.75rem; color:#94a3b8;">📍 ${d.distance_km} km</span></div>
                        <div style="text-align:right;"><span style="display:block; color:${statusText.includes('SMS/WHATSAPP') ? '#38bdf8' : '#4ade80'}; font-weight:bold; font-size:0.6rem;">${statusText}</span></div>
                    </div>`;
                });
            }

            if (append) resultsDiv.innerHTML += html;
            else resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
